<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triqui Challenge</title>
  <style>
    :root {
      --bg: #95d7d7;
      --panel: #9af0e4;
      --line: #1738b6;
      --accent: #39db53;
      --text: #1f1f1f;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #dcdcdc;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .phone {
      position: relative;
      width: 360px;
      min-height: 740px;
      background: var(--bg);
      border: 2px solid #1b1b1b;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    .topbar {
      height: 28px;
      background: #2f48c5;
    }
    .screen {
      display: none;
      padding: 14px 10px 18px;
      min-height: 712px;
    }
    .screen.active {
      display: block;
    }
    .panel {
      border: 2px solid #111;
      background: var(--panel);
      padding: 10px;
      margin-bottom: 14px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .menu-col {
      border: 2px solid #111;
      background: #b6ffe2;
      padding: 8px;
      display: grid;
      gap: 10px;
    }
    .cat-btn {
      border: 1px solid #2a2a2a;
      background: #95f0ea;
      font-size: 14px;
      text-transform: uppercase;
      padding: 6px 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cat-btn.selected {
      border: 2px solid #1738b6;
      background: #d7fffb;
      font-weight: 700;
    }
    .cat-btn span {
      display: inline-grid;
      place-items: center;
      min-width: 38px;
      height: 26px;
      background: linear-gradient(90deg, #ff4b4b, #66a9ff);
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      border: 1px solid rgba(0, 0, 0, 0.25);
    }
    .cat-btn:nth-child(2n) span {
      background: linear-gradient(90deg, #6ac0ff, #937bff);
    }
    .cat-btn:nth-child(3n) span {
      background: linear-gradient(90deg, #f8d95d, #94df5f);
    }
    .main-btn {
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #1b7f2e;
      background: var(--accent);
      font-size: 20px;
      cursor: pointer;
      margin: 8px auto 0;
      display: block;
    }
    .form-row {
      display: grid;
      grid-template-columns: 105px 1fr;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    label {
      font-size: 28px;
      color: #2f2f2f;
    }
    input[type="text"] {
      width: 100%;
      border: 1px solid #6f6f6f;
      background: #e7e7e7;
      font-size: 22px;
      padding: 4px 8px;
    }
    .score-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
    }
    .score-box {
      border: 1px solid #3b3b3b;
      background: #c0f3d5;
      padding: 6px;
      text-align: center;
    }
    .score-name {
      font-size: 14px;
      margin-bottom: 2px;
    }
    .score-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }
    .category-text {
      text-align: center;
      font-size: 20px;
      margin: 2px 0 0;
    }
    #status {
      text-align: center;
      font-size: 30px;
      margin: 8px 0 10px;
      color: #2f2f2f;
      min-height: 62px;
      display: grid;
      place-items: center;
    }
    .board-wrap {
      display: grid;
      place-items: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 92px);
      grid-template-rows: repeat(3, 92px);
      border: 4px solid var(--line);
      background: #b4ffff;
    }
    .cell {
      border: 2px solid var(--line);
      background: #cbffff;
      color: #111;
      font-size: 62px;
      line-height: 1;
      cursor: pointer;
      font-family: "Segoe UI", sans-serif;
      transition: transform 0.08s ease;
    }
    .cell:active {
      transform: scale(0.96);
    }
    .cell.win {
      background: #ffe788;
    }
    .controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .controls button {
      border: 1px solid #2a5d2a;
      background: #b6efb4;
      font-size: 18px;
      padding: 8px 4px;
      cursor: pointer;
    }
    .controls button.primary {
      background: var(--accent);
      border-color: #1b7f2e;
      font-weight: 600;
    }
    .question-overlay {
      position: absolute;
      inset: 28px 0 0 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.45);
      padding: 14px;
      z-index: 20;
    }
    .question-overlay.active {
      display: grid;
    }
    .question-card {
      width: 100%;
      max-width: 330px;
      border: 2px solid #111;
      background: #b7fff2;
      padding: 10px;
    }
    .question-category {
      font-weight: 700;
      color: #1738b6;
      font-size: 16px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #questionText {
      margin: 0 0 10px;
      font-size: 21px;
      line-height: 1.2;
    }
    .options-container {
      display: grid;
      gap: 8px;
    }
    .option-btn {
      border: 1px solid #2a2a2a;
      background: #e9fff5;
      font-size: 16px;
      text-align: left;
      padding: 9px 10px;
      cursor: pointer;
    }
    .option-btn:hover {
      background: #d6f5ff;
    }
    .answer-feedback {
      position: absolute;
      inset: 28px 0 0 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.45);
      padding: 14px;
      z-index: 25;
    }
    .answer-feedback.active {
      display: grid;
    }
    .answer-card {
      width: 90%;
      max-width: 300px;
      border: 2px solid #111;
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      padding: 24px 12px;
      color: #132;
    }
    .answer-card.correct {
      background: #98ff95;
    }
    .answer-card.wrong {
      background: #ffb2b2;
      color: #501;
    }
  </style>
</head>

      </div>

    const names = { X: "Jugador 1", O: "Jugador 2" };
    const scores = { X: 0, O: 0 };
    const usedQuestions = {
      historia: new Set(),
      deportes: new Set(),
      ciencias: new Set(),
      geografia: new Set(),
      entretenimiento: new Set()
    };
    let board = Array(9).fill("");
    let active = false;
    let current = "X";
    const selectedCategories = new Set(["historia"]);
    let questionOpen = false;
    let pendingMoveIndex = null;
    let activeQuestion = null;

    function syncNames() {
      names.X = player1Input.value.trim() || "Jugador 1";
      names.O = player2Input.value.trim() || "Jugador 2";
      scoreNameX.textContent = `${names.X} (X)`;
      scoreNameO.textContent = `${names.O} (O)`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateScores() {
      scoreXEl.textContent = String(scores.X);
      scoreOEl.textContent = String(scores.O);
    }

    function clearWinMarks() {
      cells.forEach((cell) => cell.classList.remove("win"));
    }

    function render() {
      cells.forEach((cell, index) => {
        cell.textContent = board[index];
        cell.disabled = !active || board[index] !== "" || questionOpen;
      });
    }
    function toggleCategory(category) {
      if (selectedCategories.has(category)) {
        if (selectedCategories.size === 1) return;
        selectedCategories.delete(category);
      } else {
        selectedCategories.add(category);
      }
      updateSelectedCategoriesUI();
    }

    function getWinnerPattern() {
      for (const pattern of patterns) {
        const [a, b, c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return pattern;
        }
      }
      return null;
    }
    function updateSelectedCategoriesUI() {
      const selectedList = Array.from(selectedCategories);
      selectedCategoryLabel.textContent = selectedList
        .map((category) => categoryLabels[category])
        .join(", ");
      categoryButtons.forEach((button) => {
        button.classList.toggle("selected", selectedCategories.has(button.dataset.category));
      });
    }

    function resetQuestionHistory() {
      baseCategories.forEach((category) => usedQuestions[category].clear());
    }

    function getQuestionCategories() {
      return selectedCategories.has("random") ? baseCategories : Array.from(selectedCategories);
    }
    function hasAvailableQuestions() {
      const categories = getQuestionCategories();
      return categories.some((category) => usedQuestions[category].size < questionBank[category].length);
    }

    function getRandomQuestion() {
      const categories = getQuestionCategories();
      let candidates = [];

      categories.forEach((category) => {
        questionBank[category].forEach((question, index) => {
          if (!usedQuestions[category].has(index)) {
            candidates.push({ ...question, category, index });
          }
        });
      });

      if (candidates.length === 0) return null;

      const randomIndex = Math.floor(Math.random() * candidates.length);
      const chosen = candidates[randomIndex];
      usedQuestions[chosen.category].add(chosen.index);
      return chosen;
    }

    function hideQuestionOverlay() {
      questionOverlay.classList.remove("active");
      questionOpen = false;
      activeQuestion = null;
      optionsContainer.innerHTML = "";
    }

    function showQuestionForCell(index) {
      pendingMoveIndex = index;
      activeQuestion = getRandomQuestion();
      if (!activeQuestion) {
        pendingMoveIndex = null;
        active = false;
        setStatus("No quedan preguntas disponibles. Pulsa Nuevo juego.");
        render();
        return;
      }
      questionOpen = true;

      questionCategoryEl.textContent = `Categoría: ${categoryLabels[activeQuestion.category]}`;
      questionTextEl.textContent = activeQuestion.text;
      optionsContainer.innerHTML = "";

      activeQuestion.options.forEach((option, optionIndex) => {
        const optionButton = document.createElement("button");
        optionButton.className = "option-btn";
        optionButton.type = "button";
        optionButton.textContent = option;
        optionButton.addEventListener("click", () => handleAnswer(optionIndex));
        optionsContainer.appendChild(optionButton);
      });

      questionOverlay.classList.add("active");
      setStatus(`Pregunta para ${names[current]} (${current})`);
      render();
    }

    function resolveCorrectAnswer(moveIndex) {
      board[moveIndex] = current;
      const winnerPattern = getWinnerPattern();

      if (winnerPattern) {
        winnerPattern.forEach((cellIndex) => cells[cellIndex].classList.add("win"));
        scores[current] += 1;
        updateScores();
        finishRound(`¡${names[current]} gana!`);
        return;
      }

      if (board.every(Boolean)) {
        finishRound("Empate");
        return;
      }

      current = current === "X" ? "O" : "X";
      setStatus(`Correcto. Turno de ${names[current]} (${current})`);
      render();
    }

    function resolveWrongAnswer() {
      current = current === "X" ? "O" : "X";
      setStatus(`Incorrecto. Turno de ${names[current]} (${current})`);
      render();
    }

    function handleAnswer(optionIndex) {
      if (!questionOpen || !activeQuestion || pendingMoveIndex === null) return;

      const moveIndex = pendingMoveIndex;
      const isCorrect = optionIndex === activeQuestion.answer;

      pendingMoveIndex = null;
      hideQuestionOverlay();

      if (!active) return;
      if (isCorrect) {
        resolveCorrectAnswer(moveIndex);
      } else {
        resolveWrongAnswer();
      }
    }

    function beginRound() {
      syncNames();
      board = Array(9).fill("");
      clearWinMarks();
      pendingMoveIndex = null;
      hideQuestionOverlay();
      if (!hasAvailableQuestions()) {
        active = false;
        setStatus("No quedan preguntas disponibles. Pulsa Nuevo juego.");
        render();
        return;
      }
      active = true;
      current = Math.random() < 0.5 ? "X" : "O";
      setStatus(`Turno de ${names[current]} (${current})`);
      render();
    }

    function finishRound(message) {
      active = false;
      setStatus(message);
      render();
    }

    function onCellClick(index) {
      if (!active || board[index] || questionOpen) return;
      showQuestionForCell(index);
    }

    continueBtn.addEventListener("click", () => {
      menuScreen.classList.remove("active");
      gameScreen.classList.add("active");
      setStatus("Pulsa Iniciar");
    });
    categoryButtons.forEach((button) => {
      button.addEventListener("click", () => toggleCategory(button.dataset.category));
    });

    cells.forEach((cell, index) => {
      cell.addEventListener("click", () => onCellClick(index));
    });

    player1Input.addEventListener("input", syncNames);
    player2Input.addEventListener("input", syncNames);

    startBtn.addEventListener("click", beginRound);
    nextRoundBtn.addEventListener("click", beginRound);
    newGameBtn.addEventListener("click", () => {
      scores.X = 0;
      scores.O = 0;
      resetQuestionHistory();
      updateScores();
      board = Array(9).fill("");
      clearWinMarks();
      pendingMoveIndex = null;
      hideQuestionOverlay();
      active = false;
      setStatus("Pulsa Iniciar");
      render();
      gameScreen.classList.remove("active");
      menuScreen.classList.add("active");
    });
    updateSelectedCategoriesUI();

    syncNames();
    updateScores();
    render();
  </script>
